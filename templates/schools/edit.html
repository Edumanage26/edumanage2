{% extends 'base.html' %}
{% block title %}Edit School{% endblock %}
{% block page_title %}Edit School{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card">
<div class="card-header">
<i class="bi bi-pencil"></i> Edit School
</div>
<div class="card-body p-4">
<form method="POST" enctype="multipart/form-data">

<div class="mb-3">
<label class="form-label fw-bold">
School Name <span class="text-danger">*</span>
</label>
<input type="text" name="name" class="form-control"
value="{{ school['name'] }}" required/>
</div>

<div class="mb-3">
<label class="form-label fw-bold">Address</label>
<textarea name="address" class="form-control"
rows="2">{{ school['address'] or '' }}</textarea>
</div>

<div class="row g-3">
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Phone Number</label>
<input type="text" name="phone" class="form-control"
value="{{ school['phone'] or '' }}"/>
</div>
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Email Address</label>
<input type="email" name="email" class="form-control"
value="{{ school['email'] or '' }}"/>
</div>
</div>

<div class="mb-4">
<label class="form-label fw-bold">School Logo</label>
{% if school['logo_url'] %}
<div class="mb-2">
<img src="{{ school['logo_url'] }}"
style="width:60px;height:60px;border-radius:8px;
object-fit:contain;border:1px solid #E2E8F0;padding:4px;"/>
<small class="text-muted ms-2">Current logo</small>
</div>
{% elif school['logo'] %}
<div class="mb-2">
<img src="/static/uploads/logos/{{ school['logo'] }}"
style="width:60px;height:60px;border-radius:8px;
object-fit:contain;border:1px solid #E2E8F0;padding:4px;"/>
<small class="text-muted ms-2">Current logo</small>
</div>
{% endif %}
<input type="file" name="logo" class="form-control"
accept="image/*"/>
<div class="form-text">Leave empty to keep current logo.</div>
</div>

<div class="d-flex gap-2">
<button type="submit" class="btn btn-primary">
<i class="bi bi-save me-1"></i> Save Changes
</button>
<a href="/schools" class="btn btn-outline-secondary">Cancel</a>
</div>

</form>
</div>
</div>
</div>
</div>
{% endblock %}
