{% extends 'base.html' %}
{% block title %}Record Payment{% endblock %}
{% block page_title %}Record Fee Payment{% endblock %}
{% block content %}
<div class="row g-4">

<!-- Load Students -->
<div class="col-md-5">
<div class="card">
<div class="card-header">
<i class="bi bi-search"></i> Find Student
</div>
<div class="card-body p-4">
<form method="GET">
<div class="mb-3">
<label class="form-label fw-bold">Select Class</label>
<select name="class_id" class="form-select">
<option value="">-- Select Class --</option>
{% for cls in classes %}
<option value="{{ cls['id'] }}"
{{ 'selected' if request.args.get('class_id') == cls['id']|string }}>
{% if cls['school_name'] is defined %}
{{ cls['school_name'] }} —
{% endif %}
{{ cls['name'] }}
</option>
{% endfor %}
</select>
</div>
<button type="submit" class="btn btn-primary w-100">
<i class="bi bi-search me-1"></i> Load Students
</button>
</form>
</div>
</div>
</div>

<!-- Payment Form -->
<div class="col-md-7">
<div class="card">
<div class="card-header">
<i class="bi bi-cash-coin"></i> Record Payment
</div>
<div class="card-body p-4">
<form method="POST">
<div class="mb-3">
<label class="form-label fw-bold">
Student <span class="text-danger">*</span>
</label>
<select name="student_id" class="form-select" required>
<option value="">-- Select Student --</option>
{% for s in students %}
<option value="{{ s['id'] }}">
{{ s['first_name'] }} {{ s['last_name'] }}
{{ '— ' + s['admission_no'] if s['admission_no'] }}
</option>
{% endfor %}
</select>
</div>
<div class="mb-3">
<label class="form-label fw-bold">
Amount Paid (N) <span class="text-danger">*</span>
</label>
<input type="number" name="amount_paid" class="form-control"
placeholder="e.g. 25000" min="0" step="100" required/>
</div>
<div class="mb-3">
<label class="form-label fw-bold">Payment Method</label>
<select name="payment_method" class="form-select">
<option value="Cash">Cash</option>
<option value="Bank Transfer">Bank Transfer</option>
<option value="POS">POS</option>
<option value="Cheque">Cheque</option>
<option value="Online">Online</option>
</select>
</div>
<div class="mb-3">
<label class="form-label fw-bold">Receipt Number</label>
<input type="text" name="receipt_no" class="form-control"
placeholder="e.g. RCP/2024/001"/>
</div>
<div class="mb-4">
<label class="form-label fw-bold">Payment Date</label>
<input type="date" name="payment_date" class="form-control"/>
</div>
<div class="d-flex gap-2">
<button type="submit" class="btn btn-primary">
<i class="bi bi-save me-1"></i> Record Payment
</button>
<a href="/fees" class="btn btn-outline-secondary">Cancel</a>
</div>
</form>
</div>
</div>
</div>

</div>
{% endblock %}
