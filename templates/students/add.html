{% extends 'base.html' %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add Student{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-8">
<div class="card">
<div class="card-header">
<i class="bi bi-person-plus"></i> Add New Student
</div>
<div class="card-body p-4">
<form method="POST" enctype="multipart/form-data">

{% if session.get('role') == 'super_admin' %}
<div class="mb-3">
<label class="form-label fw-bold">
School <span class="text-danger">*</span>
</label>
<select name="school_id" class="form-select" required
onchange="filterClasses(this.value)">
<option value="">-- Select School --</option>
{% for sch in schools %}
<option value="{{ sch['id'] }}">{{ sch['name'] }}</option>
{% endfor %}
</select>
</div>
{% endif %}

<div class="row g-3">
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">
First Name <span class="text-danger">*</span>
</label>
<input type="text" name="first_name" class="form-control"
placeholder="Enter first name" required/>
</div>
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">
Last Name <span class="text-danger">*</span>
</label>
<input type="text" name="last_name" class="form-control"
placeholder="Enter last name" required/>
</div>
</div>

<div class="row g-3">
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Admission Number</label>
<input type="text" name="admission_no" class="form-control"
placeholder="e.g. RCS/2024/001"/>
</div>
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Class</label>
<select name="class_id" class="form-select" id="class_select">
<option value="">-- Select Class --</option>
{% for cls in classes %}
<option value="{{ cls['id'] }}"
data-school="{{ cls['school_id'] }}">
{{ cls['name'] }}
</option>
{% endfor %}
</select>
</div>
</div>

<div class="row g-3">
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Gender</label>
<select name="gender" class="form-select">
<option value="">-- Select Gender --</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Date of Birth</label>
<input type="date" name="date_of_birth" class="form-control"/>
</div>
</div>

<div class="row g-3">
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Parent Phone</label>
<input type="text" name="parent_phone" class="form-control"
placeholder="e.g. 08012345678"/>
</div>
<div class="col-md-6 mb-3">
<label class="form-label fw-bold">Parent Email</label>
<input type="email" name="parent_email" class="form-control"
placeholder="parent@email.com"/>
</div>
</div>

<div class="mb-3">
<label class="form-label fw-bold">Address</label>
<textarea name="address" class="form-control"
rows="2" placeholder="Student home address"></textarea>
</div>

<div class="mb-4">
<label class="form-label fw-bold">Passport Photo</label>
<input type="file" name="photo" class="form-control"
accept="image/*"/>
<div class="form-text">JPG or PNG. Max 2MB.</div>
</div>

<div class="d-flex gap-2">
<button type="submit" class="btn btn-primary">
<i class="bi bi-save me-1"></i> Add Student
</button>
<a href="/students" class="btn btn-outline-secondary">Cancel</a>
</div>

</form>
</div>
</div>
</div>
</div>

<script>
function filterClasses(schoolId) {
  var select  = document.getElementById('class_select');
  var options = select.querySelectorAll('option');
  options.forEach(function(opt) {
    if (!opt.value) return;
    if (!schoolId || opt.getAttribute('data-school') == schoolId) {
      opt.style.display = '';
    } else {
      opt.style.display = 'none';
    }
  });
  select.value = '';
}
</script>
{% endblock %}
